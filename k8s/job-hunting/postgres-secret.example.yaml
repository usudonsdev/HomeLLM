apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: job-hunting
type: Opaque
stringData:
  POSTGRES_USER: "<POSTGRES_USER>"
  POSTGRES_PASSWORD: "<POSTGRES_PASSWORD>"
  POSTGRES_DB: "homellm"
# Apply from a local copy only. Do not commit filled values.
#   cp postgres-secret.example.yaml /secure/path/postgres-secret.yaml
#   kubectl apply -f /secure/path/postgres-secret.yaml
