apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: job-hunting
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: homellm
spec:
  # Windows + Docker Desktop / k3d: host.docker.internal reaches the host Ollama (:11434).
  # host.k3d.internal is documented by k3d but often does not resolve inside pods here.
  # Bare-metal k3s later: replace via local overlay (never commit real LAN IPs).
  type: ExternalName
  externalName: host.docker.internal
  ports:
    - name: http
      port: 11434
      targetPort: 11434
