apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: job-hunting
data:
  # Reach Windows-host Ollama from k3d/Docker Desktop (not an in-cluster Pod).
  # Prefer host.docker.internal — host.k3d.internal often fails DNS inside pods on Docker Desktop.
  OLLAMA_BASE_URL: "http://host.docker.internal:11434"
  OLLAMA_MODEL: "qwen3.5:9b"
  OLLAMA_TIMEOUT_SECONDS: "300"
  OLLAMA_KEEP_ALIVE: "24h"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-hunting-api
  namespace: job-hunting
  labels:
    app: job-hunting-api
    app.kubernetes.io/part-of: homellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-hunting-api
  template:
    metadata:
      labels:
        app: job-hunting-api
    spec:
      containers:
        - name: api
          image: homellm/job-hunting-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-db-secret
                  key: DATABASE_URL
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: OLLAMA_BASE_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: OLLAMA_MODEL
            - name: OLLAMA_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: OLLAMA_TIMEOUT_SECONDS
            - name: OLLAMA_KEEP_ALIVE
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: OLLAMA_KEEP_ALIVE
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: job-hunting-api
  namespace: job-hunting
  labels:
    app: job-hunting-api
spec:
  selector:
    app: job-hunting-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
