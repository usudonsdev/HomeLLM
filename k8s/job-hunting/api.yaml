apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: job-hunting
data:
  # Fill via local overlay or edit after clone. Do not commit real Tailscale IPs.
  OLLAMA_BASE_URL: "http://<WINDOWS_TAILSCALE_IP_OR_HOST_GATEWAY>:11434"
  OLLAMA_MODEL: "qwen3.5:9b"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-hunting-api
  namespace: job-hunting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-hunting-api
  template:
    metadata:
      labels:
        app: job-hunting-api
    spec:
      containers:
        - name: api
          image: homellm/job-hunting-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-db-secret
                  key: DATABASE_URL
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: OLLAMA_BASE_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: OLLAMA_MODEL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: job-hunting-api
  namespace: job-hunting
spec:
  selector:
    app: job-hunting-api
  ports:
    - port: 8000
      targetPort: 8000
