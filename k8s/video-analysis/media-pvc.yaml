# video-analysis media layout (PVC mount: /media)
#
#   inbox/              drop source videos here (host / Tailscale sync)
#   work/<jobId>/       source moved here after registration
#   rounds/<jobId>/     segmented round clips + cuts.json
#   state/<jobId>.json  job status documents
#   done/  failed/      optional post-processing shelves
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: video-media-pvc
  namespace: video-analysis
  labels:
    app.kubernetes.io/part-of: homellm
    homellm.io/role: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
