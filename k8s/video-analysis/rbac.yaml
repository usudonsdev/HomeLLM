apiVersion: v1
kind: ServiceAccount
metadata:
  name: video-ingest
  namespace: video-analysis
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: video-ingest-job-creator
  namespace: video-analysis
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: video-ingest-job-creator
  namespace: video-analysis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: video-ingest-job-creator
subjects:
  - kind: ServiceAccount
    name: video-ingest
    namespace: video-analysis
