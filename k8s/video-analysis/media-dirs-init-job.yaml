apiVersion: batch/v1
kind: Job
metadata:
  name: media-dirs-init
  namespace: video-analysis
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /media/inbox /media/work /media/rounds /media/state /media/done /media/failed
              chmod -R 777 /media
          volumeMounts:
            - name: media
              mountPath: /media
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: video-media-pvc
