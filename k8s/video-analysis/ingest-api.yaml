apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: video-analysis
data:
  OLLAMA_BASE_URL: "http://host.docker.internal:11434"
  OLLAMA_MODEL: "qwen3.5:9b"
  OLLAMA_TIMEOUT_SECONDS: "300"
  OLLAMA_KEEP_ALIVE: "24h"
  ANALYZER_IMAGE: "homellm/valorant-analyzer:dev"
  INTERNAL_API_BASE_URL: "http://video-ingest-api:8090"
  ANALYZER_POLL_SECONDS: "5"
  UPLOAD_MAX_BYTES: "34359738368"
  HOST_INBOX_HINT: "Documents\\HomeLLM\\videos\\inbox"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-ingest-api
  namespace: video-analysis
  labels:
    app: video-ingest-api
    app.kubernetes.io/part-of: homellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-ingest-api
  template:
    metadata:
      labels:
        app: video-ingest-api
    spec:
      serviceAccountName: video-ingest
      containers:
        - name: api
          image: homellm/video-ingest-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-db-secret
                  key: DATABASE_URL
            - name: MEDIA_ROOT
              value: /media
            - name: NAMESPACE
              value: video-analysis
            - name: SEGMENTER_IMAGE
              value: homellm/valorant-segmenter:dev
            - name: ANALYZER_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: ANALYZER_IMAGE
            - name: INTERNAL_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: INTERNAL_API_BASE_URL
            - name: ANALYZER_POLL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: ANALYZER_POLL_SECONDS
            - name: STUB_SEGMENT_SECONDS
              value: "2"
            - name: UPLOAD_MAX_BYTES
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: UPLOAD_MAX_BYTES
            - name: HOST_INBOX_HINT
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: HOST_INBOX_HINT
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: OLLAMA_BASE_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: OLLAMA_MODEL
            - name: OLLAMA_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: OLLAMA_TIMEOUT_SECONDS
            - name: OLLAMA_KEEP_ALIVE
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: OLLAMA_KEEP_ALIVE
          volumeMounts:
            - name: media
              mountPath: /media
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: video-media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: video-ingest-api
  namespace: video-analysis
  labels:
    app: video-ingest-api
spec:
  selector:
    app: video-ingest-api
  ports:
    - name: http
      port: 8090
      targetPort: 8090
