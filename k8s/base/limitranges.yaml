apiVersion: v1
kind: LimitRange
metadata:
  name: job-hunting-limits
  namespace: job-hunting
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
      max:
        cpu: "2"
        memory: 2Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: video-analysis-limits
  namespace: video-analysis
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 250m
        memory: 256Mi
      default:
        cpu: "1"
        memory: 1Gi
      max:
        cpu: "2"
        memory: 4Gi
    - type: Pod
      max:
        cpu: "4"
        memory: 8Gi
